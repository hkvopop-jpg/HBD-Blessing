<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ganpati Bappa — Happy Birthday Yashika</title>
<meta name="theme-color" content="#000000">
<meta property="og:title" content="Ganpati Bappa ka Ashirvaad 🙏">
<meta property="og:description" content="Happy Birthday Yashika 🌸">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --c:#00ffff;--m:#ff00ff;--y:#ffff00;--g:#00ff88;
  --w:#ffffff;--r:#ff0040;--o:#ff8800;--ink:#00000a;
}
html,body{width:100%;min-height:100vh;background:var(--ink);font-family:'Georgia',serif;overflow-x:hidden;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

.page{
  position:relative;z-index:2;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(14px,4vw,30px) 0 clamp(24px,6vw,40px);
}

.top-label{
  font-size:clamp(9px,2.2vw,12px);
  letter-spacing:clamp(4px,1.8vw,9px);
  text-transform:uppercase;
  color:var(--c);
  text-shadow:0 0 8px var(--c),0 0 22px var(--c),0 0 45px var(--c);
  margin-bottom:clamp(10px,3vw,20px);
  animation:flicker 4s ease-in-out infinite;
  text-align:center;
}
@keyframes flicker{0%,18%,20%,22%,60%,62%,100%{opacity:1}19%,21%,61%{opacity:.3}}

.center-zone{
  display:flex;
  align-items:stretch;
  justify-content:center;
  width:100%;
  max-width:520px;
  padding:0 clamp(2px,1vw,8px);
}

.laser-panel{
  flex-shrink:0;
  width:clamp(42px,11vw,76px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:clamp(4px,1.2vw,8px);
  padding:clamp(8px,2vw,16px) 0;
  position:relative;
}
.laser-panel.left{align-items:flex-end;}
.laser-panel.right{align-items:flex-start;}
.laser-panel.left::after{
  content:'';position:absolute;right:0;top:8%;height:84%;width:1px;
  background:linear-gradient(to bottom,transparent,var(--c),var(--m),var(--c),transparent);
  box-shadow:0 0 6px var(--c);opacity:.3;
}
.laser-panel.right::before{
  content:'';position:absolute;left:0;top:8%;height:84%;width:1px;
  background:linear-gradient(to bottom,transparent,var(--m),var(--c),var(--m),transparent);
  box-shadow:0 0 6px var(--m);opacity:.3;
}

.lbar{height:clamp(2px,0.4vw,2.8px);border-radius:2px;animation:lPulse 1.9s ease-in-out infinite;}
.lbar.c{background:var(--c);box-shadow:0 0 6px var(--c),0 0 14px var(--c),0 0 26px var(--c);}
.lbar.m{background:var(--m);box-shadow:0 0 6px var(--m),0 0 14px var(--m),0 0 26px var(--m);animation-delay:.25s;}
.lbar.y{background:var(--y);box-shadow:0 0 6px var(--y),0 0 14px var(--y),0 0 26px var(--y);animation-delay:.5s;}
.lbar.g{background:var(--g);box-shadow:0 0 6px var(--g),0 0 14px var(--g),0 0 26px var(--g);animation-delay:.75s;}
.lbar.r{background:var(--r);box-shadow:0 0 6px var(--r),0 0 14px var(--r),0 0 26px var(--r);animation-delay:1s;}
.lbar.w{background:var(--w);box-shadow:0 0 5px var(--w),0 0 11px var(--w);animation-delay:1.25s;}
.lbar.o{background:var(--o);box-shadow:0 0 6px var(--o),0 0 14px var(--o),0 0 26px var(--o);animation-delay:1.5s;}
@keyframes lPulse{0%,100%{opacity:.18;transform:scaleX(.55)}50%{opacity:1;transform:scaleX(1)}}

.left .lbar:nth-child(1){width:clamp(18px,6vw,46px);animation-delay:0s;}
.left .lbar:nth-child(2){width:clamp(34px,10vw,68px);animation-delay:.2s;}
.left .lbar:nth-child(3){width:clamp(12px,4vw,30px);animation-delay:.4s;}
.left .lbar:nth-child(4){width:clamp(40px,11.5vw,76px);animation-delay:.6s;}
.left .lbar:nth-child(5){width:clamp(22px,7vw,52px);animation-delay:.8s;}
.left .lbar:nth-child(6){width:clamp(14px,4.5vw,34px);animation-delay:1s;}
.left .lbar:nth-child(7){width:clamp(36px,10.5vw,70px);animation-delay:1.2s;}
.left .lbar:nth-child(8){width:clamp(26px,8vw,58px);animation-delay:1.4s;}
.left .lbar:nth-child(9){width:clamp(42px,12vw,78px);animation-delay:1.6s;}
.left .lbar:nth-child(10){width:clamp(16px,5vw,38px);animation-delay:1.8s;}
.left .lbar:nth-child(11){width:clamp(30px,9vw,62px);animation-delay:2s;}
.left .lbar:nth-child(12){width:clamp(20px,6.5vw,48px);animation-delay:2.2s;}
.left .lbar:nth-child(13){width:clamp(38px,11vw,74px);animation-delay:2.4s;}

.right .lbar:nth-child(1){width:clamp(36px,10.5vw,70px);animation-delay:.15s;}
.right .lbar:nth-child(2){width:clamp(20px,6.5vw,48px);animation-delay:.35s;}
.right .lbar:nth-child(3){width:clamp(42px,12vw,78px);animation-delay:.55s;}
.right .lbar:nth-child(4){width:clamp(14px,4.5vw,34px);animation-delay:.75s;}
.right .lbar:nth-child(5){width:clamp(34px,10vw,68px);animation-delay:.95s;}
.right .lbar:nth-child(6){width:clamp(24px,7.5vw,54px);animation-delay:1.15s;}
.right .lbar:nth-child(7){width:clamp(40px,11.5vw,76px);animation-delay:1.35s;}
.right .lbar:nth-child(8){width:clamp(16px,5vw,38px);animation-delay:1.55s;}
.right .lbar:nth-child(9){width:clamp(30px,9vw,62px);animation-delay:1.75s;}
.right .lbar:nth-child(10){width:clamp(18px,6vw,46px);animation-delay:1.95s;}
.right .lbar:nth-child(11){width:clamp(38px,11vw,74px);animation-delay:2.15s;}
.right .lbar:nth-child(12){width:clamp(22px,7vw,52px);animation-delay:2.35s;}
.right .lbar:nth-child(13){width:clamp(44px,12.5vw,80px);animation-delay:2.55s;}

.bappa-zone{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;
  position:relative;
  padding:0 clamp(3px,1vw,7px);
  -webkit-user-select:none;user-select:none;
}
.ray-bg{
  position:absolute;inset:-15px;
  background:conic-gradient(
    from 0deg,
    rgba(255,200,0,.0) 0deg,rgba(255,200,0,.07) 10deg,rgba(255,200,0,.0) 20deg,
    rgba(255,200,0,.05) 30deg,rgba(255,200,0,.0) 40deg,
    rgba(255,200,0,.07) 50deg,rgba(255,200,0,.0) 60deg,
    rgba(255,200,0,.05) 70deg,rgba(255,200,0,.0) 80deg,
    rgba(255,200,0,.07) 90deg,rgba(255,200,0,.0) 100deg,
    rgba(255,200,0,.05) 110deg,rgba(255,200,0,.0) 120deg,
    rgba(255,200,0,.07) 130deg,rgba(255,200,0,.0) 140deg,
    rgba(255,200,0,.05) 150deg,rgba(255,200,0,.0) 160deg,
    rgba(255,200,0,.07) 170deg,rgba(255,200,0,.0) 180deg,
    rgba(255,200,0,.05) 190deg,rgba(255,200,0,.0) 200deg,
    rgba(255,200,0,.07) 210deg,rgba(255,200,0,.0) 220deg,
    rgba(255,200,0,.05) 230deg,rgba(255,200,0,.0) 240deg,
    rgba(255,200,0,.07) 250deg,rgba(255,200,0,.0) 260deg,
    rgba(255,200,0,.05) 270deg,rgba(255,200,0,.0) 280deg,
    rgba(255,200,0,.07) 290deg,rgba(255,200,0,.0) 300deg,
    rgba(255,200,0,.05) 310deg,rgba(255,200,0,.0) 320deg,
    rgba(255,200,0,.07) 330deg,rgba(255,200,0,.0) 340deg,
    rgba(255,200,0,.05) 350deg,rgba(255,200,0,.0) 360deg
  );
  border-radius:50%;
  animation:raySpin 14s linear infinite;
  pointer-events:none;z-index:0;
}
@keyframes raySpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.img-outer{
  position:relative;z-index:1;
  padding:clamp(3px,0.8vw,5px);
  border-radius:14px;
  background:conic-gradient(var(--c),var(--m),var(--y),var(--g),var(--o),var(--c));
  animation:ringHue 5s linear infinite;
  box-shadow:0 0 22px rgba(0,255,255,.45),0 0 50px rgba(255,0,255,.25),0 0 80px rgba(255,200,0,.12);
  transition:transform .15s;
}
@keyframes ringHue{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
.img-outer::before{
  content:'';position:absolute;inset:3px;border-radius:11px;
  background:var(--ink);z-index:0;
}
.bappa-img{
  position:relative;z-index:1;
  width:clamp(148px,41vw,268px);
  height:clamp(208px,56vw,368px);
  object-fit:cover;object-position:center top;
  border-radius:10px;display:block;
  filter:brightness(1.1) contrast(1.06) saturate(1.08);
  animation:bFloat 3.8s ease-in-out infinite;
}
@keyframes bFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.bappa-zone:active .img-outer{transform:scale(.95);}

.om-text{
  position:relative;z-index:1;
  font-size:clamp(15px,4vw,22px);
  color:var(--y);
  text-shadow:0 0 10px var(--y),0 0 26px var(--y),0 0 52px var(--y);
  margin-top:clamp(6px,1.8vw,11px);
  letter-spacing:5px;
  animation:flicker 3.5s .8s infinite;
}

.bday-wrap{
  margin-top:clamp(12px,3.5vw,22px);
  text-align:center;
}
.bday-line1{
  font-size:clamp(11px,3vw,16px);
  letter-spacing:clamp(3px,1.2vw,7px);
  color:var(--m);
  text-shadow:0 0 10px var(--m),0 0 26px var(--m),0 0 50px var(--m);
  text-transform:uppercase;
  animation:flicker 5s 1.5s infinite;
}
.bday-name{
  display:block;
  font-size:clamp(30px,9.5vw,62px);
  color:var(--c);
  text-shadow:0 0 16px var(--c),0 0 36px var(--c),0 0 72px var(--c);
  letter-spacing:clamp(3px,1.5vw,9px);
  margin-top:2px;
  animation:nameShimr 3s linear infinite;
  line-height:1.1;
}
@keyframes nameShimr{0%,100%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(38deg) brightness(1.16)}}

.divider{
  width:clamp(210px,80vw,390px);height:1px;
  background:linear-gradient(to right,transparent,var(--c),var(--m),var(--y),transparent);
  box-shadow:0 0 10px var(--c),0 0 20px rgba(255,0,255,.28);
  margin:clamp(12px,3.5vw,20px) 0;opacity:.55;
  position:relative;
}
.divider::after{
  content:'◆';position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:8px;color:var(--y);
  text-shadow:0 0 6px var(--y),0 0 14px var(--y);
  background:var(--ink);padding:0 4px;
}

.card{
  width:clamp(272px,88vw,420px);
  background:rgba(0,0,4,.84);
  border:1px solid rgba(0,255,255,.28);
  border-radius:6px;
  padding:clamp(14px,4vw,22px) clamp(16px,4.5vw,26px);
  text-align:center;
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,255,.05),transparent);
  animation:cScan 4s linear infinite;pointer-events:none;
}
@keyframes cScan{0%{left:-50%}100%{left:150%}}
.cc{position:absolute;width:15px;height:15px;}
.cc.tl{top:0;left:0;border-top:2px solid var(--c);border-left:2px solid var(--c);box-shadow:0 0 5px var(--c);}
.cc.tr{top:0;right:0;border-top:2px solid var(--y);border-right:2px solid var(--y);box-shadow:0 0 5px var(--y);}
.cc.bl{bottom:0;left:0;border-bottom:2px solid var(--g);border-left:2px solid var(--g);box-shadow:0 0 5px var(--g);}
.cc.br{bottom:0;right:0;border-bottom:2px solid var(--m);border-right:2px solid var(--m);box-shadow:0 0 5px var(--m);}
.card-title{
  font-size:clamp(12px,3.2vw,15px);
  color:var(--c);text-shadow:0 0 8px var(--c),0 0 20px var(--c);
  letter-spacing:2px;margin-bottom:9px;
  min-height:20px;transition:opacity .35s;
}
.card-body{
  font-size:clamp(12px,3vw,14px);
  color:rgba(185,255,255,.84);
  line-height:2;min-height:68px;transition:opacity .35s;
}
.card-body em{color:var(--m);font-style:normal;text-shadow:0 0 7px var(--m);}
.card-body b{color:var(--y);text-shadow:0 0 7px var(--y);}
.card-body .hi{color:var(--g);text-shadow:0 0 7px var(--g);}

.tap-btn{
  margin-top:clamp(12px,3.5vw,18px);
  font-size:clamp(10px,2.4vw,12px);
  letter-spacing:3px;color:var(--c);
  text-shadow:0 0 8px var(--c);
  border:1px solid rgba(0,255,255,.38);
  border-radius:3px;
  padding:clamp(9px,2.5vw,12px) clamp(18px,5vw,28px);
  cursor:pointer;background:rgba(0,255,255,.04);
  user-select:none;touch-action:manipulation;
  animation:btnGlw 2.3s ease-in-out infinite;
  transition:all .18s;
  position:relative;overflow:hidden;
  -webkit-user-select:none;
}
.tap-btn::after{
  content:'';position:absolute;top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,255,.1),transparent);
  animation:cScan 2.6s linear infinite;
}
.tap-btn:active{background:rgba(0,255,255,.16);transform:scale(.94);}
@keyframes btnGlw{0%,100%{box-shadow:0 0 5px rgba(0,255,255,.1)}50%{box-shadow:0 0 20px rgba(0,255,255,.5),0 0 40px rgba(0,255,255,.18)}}

.hint{
  font-size:clamp(9px,2vw,11px);letter-spacing:3px;
  color:rgba(0,255,255,.28);margin-top:8px;
  animation:hintB 2.1s ease-in-out infinite;
  text-align:center;
}
@keyframes hintB{0%,100%{opacity:.28}50%{opacity:.85}}

/* FLOWERS */
.flower{
  position:fixed;pointer-events:none;z-index:60;
  animation:flowerFly ease-out forwards;
  will-change:transform,opacity;
  line-height:1;
}
@keyframes flowerFly{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  65%{opacity:1}
  100%{opacity:0;transform:translate(var(--fx),var(--fy)) scale(.5) rotate(var(--fr))}
}

/* LASER DOTS */
.pt{
  position:fixed;pointer-events:none;z-index:58;
  border-radius:50%;
  animation:ptUp ease-out forwards;
}
@keyframes ptUp{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--px),var(--py)) scale(.05)}
}
.lray{
  position:fixed;pointer-events:none;z-index:57;
  height:2px;border-radius:1px;
  transform-origin:left center;
  animation:rayFly .44s ease-out forwards;
}
@keyframes rayFly{0%{opacity:1;transform:rotate(var(--a)) scaleX(1)}100%{opacity:0;transform:rotate(var(--a)) scaleX(3)}}
</style>
</head>

    <div class="card-body" id="cBody">
      <em>Yashika</em> ko janam din ki<br>
      bahut bahut shubhkamnayein! 🎂<br><br>
      Bappa tumhare jeevan mein<br>
      <em>khushi, safalta aur pyaar</em> laayen 🌸
    </div>

  <div class="hint">⚡ tap for flowers &amp; blessings ⚡</div>
</div>

<script>
/* BG */
const cnv=document.getElementById('bg'),ctx=cnv.getContext('2d');
let W,H,_st=null;
function initBg(){W=cnv.width=innerWidth;H=cnv.height=innerHeight;_st=null;}
function drawBg(){
  ctx.clearRect(0,0,W,H);
  const t=Date.now()*.00028;
  const sy=(Math.sin(t)*.5+.5)*H;
  const g=ctx.createLinearGradient(0,sy-60,0,sy+60);
  g.addColorStop(0,'rgba(0,255,255,0)');
  g.addColorStop(.5,'rgba(0,255,255,.026)');
  g.addColorStop(1,'rgba(0,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,sy-60,W,120);
  if(!_st){
    _st=[];
    for(let i=0;i<180;i++)_st.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*.9+.1,ph:Math.random()*Math.PI*2,
      sp:Math.random()*.003+.0008,
      c:['0,255,255','255,0,255','255,200,0','0,255,136'][~~(Math.random()*4)]
    });
  }
  _st.forEach(s=>{
    const a=.06+.38*(Math.sin(Date.now()*s.sp+s.ph)*.5+.5);
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${s.c},${a})`;ctx.fill();
  });
  requestAnimationFrame(drawBg);
}
initBg();drawBg();
window.addEventListener('resize',initBg);

/* BLESSINGS */
const blessings=[
  {t:'🙏 GANPATI BAPPA MORYA 🙏',b:'<em>Yashika</em> ko janam din ki<br>bahut bahut shubhkamnayein! 🎂<br><br>Bappa tumhare jeevan mein<br><em>khushi, safalta aur pyaar</em> laayen 🌸'},
  {t:'⚡ VIGHNAHARTA KI KRIPA ⚡',b:'<em>Yashika</em>, Bappa kehte hain —<br>tum bahut <em>khaas</em> ho! 🌟<br><br>Har mushkil door hogi,<br>har raah <em>roshan</em> rahegi ✨'},
  {t:'[ RIDDHI SIDDHI ASHIRVAAD ]',b:'Ganpati Bappa bless you, Yashika 🌸</em>, May your life be filled  <br><br>with happiness, success, and beautiful moments.<br>har dua <em>qubool</em> ho 🙏<br><span class="hi">Bappa saath hain hamesha!</span>'},
  {t:'⚡ MODAK WALA PYAAR ⚡',b:'Jitna meetha ye modak hai<br>utni hi meethi rahe apki lyf <em>Yashika</em> 🍮<br><br>Zindagi mein sirf<br><em>good vibes, no tension!</em> 💛'},
  {t:'🌸 BAPPA KA DIL SE ASHIRVAAD 🌸',b:'Happy Birthday <em>Yashika</em>! 🎉<br><br>Tum woh insaan ho jo<br><em>sab ke dil mein rehti</em> hai 💖<br><br><span class="hi">Bappa tumhari har dua puri karege ✨</span>'},
];
let bIdx=0;

/* FLOWERS */
const flowers=['🌸','🌺','🌼','🌷','🌻','💐','🪷','🌹'];
function spawnFlowers(x,y){
  const n=16+~~(Math.random()*8);
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const f=document.createElement('div');
      f.className='flower';
      f.textContent=flowers[~~(Math.random()*flowers.length)];
      f.style.cssText=`left:${x}px;top:${y}px;font-size:${16+Math.random()*20}px;`;
      const ang=Math.random()*Math.PI*2;
      const dist=65+Math.random()*155;
      f.style.setProperty('--fx',Math.cos(ang)*dist+'px');
      f.style.setProperty('--fy',(Math.sin(ang)*dist-50-Math.random()*90)+'px');
      f.style.setProperty('--fr',(Math.random()*360-180)+'deg');
      const dur=.85+Math.random()*.9;
      f.style.animationDuration=dur+'s';
      document.body.appendChild(f);
      setTimeout(()=>f.remove(),(dur*1000)+100);
    },i*30);
  }
}

/* BURST */
const pC=['#00ffff','#ff00ff','#ffff00','#00ff88','#ff8800','#ff0040','#ffffff'];
function spawnBurst(x,y){
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='pt';
    const col=pC[~~(Math.random()*pC.length)],sz=3+Math.random()*5;
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 7px ${col},0 0 14px ${col};`;
    const ang=(i/14)*Math.PI*2,d=40+Math.random()*90;
    p.style.setProperty('--px',Math.cos(ang)*d+'px');
    p.style.setProperty('--py',Math.sin(ang)*d+'px');
    p.style.animationDuration=(.4+Math.random()*.5)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
  }
  for(let i=0;i<8;i++){
    const l=document.createElement('div');l.className='lray';
    const col=pC[~~(Math.random()*pC.length)],len=50+Math.random()*75;
    l.style.cssText=`left:${x}px;top:${y}px;width:${len}px;background:${col};box-shadow:0 0 7px ${col},0 0 15px ${col};`;
    l.style.setProperty('--a',(i/8*360)+'deg');
    document.body.appendChild(l);setTimeout(()=>l.remove(),500);
  }
}

/* TAP */
function onTap(x,y){
  spawnBurst(x,y);
  spawnFlowers(x,y);
  bIdx=(bIdx+1)%blessings.length;
  const b=blessings[bIdx];
  const t=document.getElementById('cTitle');
  const bd=document.getElementById('cBody');
  t.style.opacity='0';bd.style.opacity='0';
  setTimeout(()=>{
    t.textContent=b.t;bd.innerHTML=b.b;
    t.style.transition='opacity .45s';bd.style.transition='opacity .45s';
    t.style.opacity='1';bd.style.opacity='1';
  },265);
}

function bind(el){
  el.addEventListener('click',e=>onTap(e.clientX,e.clientY));
  el.addEventListener('touchend',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    onTap(t.clientX,t.clientY);
  },{passive:false});
}
bind(document.getElementById('bappaZone'));
bind(document.getElementById('tapBtn'));
</script>
